<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORS Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1e1e2d;
            color: #fff;
        }
        .test-box {
            background: #2c2c3e;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        button {
            background: #7b68ee;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #6a5acd;
        }
        .success { color: #66bb6a; }
        .error { color: #ef5350; }
        pre {
            background: #1a1a2e;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🔍 nCaptcha CORS Test</h1>

    <div class="test-box">
        <h2>1. Health Check</h2>
        <button onclick="testHealth()">Test /api/health</button>
        <div id="health-result"></div>
    </div>

    <div class="test-box">
        <h2>2. Challenge Request</h2>
        <button onclick="testChallenge()">Test /api/challenge</button>
        <div id="challenge-result"></div>
    </div>

    <div class="test-box">
        <h2>3. Full Validation Flow</h2>
        <button onclick="testFullFlow()">Test Complete Flow</button>
        <div id="flow-result"></div>
    </div>

    <script>
        const API_URL = "http://localhost:8910";

        async function testHealth() {
            const result = document.getElementById('health-result');
            result.innerHTML = '<p>Testing...</p>';

            try {
                const response = await fetch(`${API_URL}/api/health`);
                const data = await response.json();

                result.innerHTML = `
                    <p class="success">✓ Success!</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                result.innerHTML = `
                    <p class="error">✗ Failed!</p>
                    <p>Error: ${error.message}</p>
                    <p>This usually means CORS is blocking the request.</p>
                `;
            }
        }

        async function testChallenge() {
            const result = document.getElementById('challenge-result');
            result.innerHTML = '<p>Testing...</p>';

            try {
                const response = await fetch(`${API_URL}/api/challenge`);
                const data = await response.json();

                result.innerHTML = `
                    <p class="success">✓ Success!</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                result.innerHTML = `
                    <p class="error">✗ Failed!</p>
                    <p>Error: ${error.message}</p>
                `;
            }
        }

        async function testFullFlow() {
            const result = document.getElementById('flow-result');
            result.innerHTML = '<p>Testing full flow...</p>';
            let output = '';

            try {
                // Step 1: Get challenge
                output += '1. Getting challenge...\n';
                const challengeRes = await fetch(`${API_URL}/api/challenge`);
                const challengeData = await challengeRes.json();
                output += `   ✓ Challenge ID: ${challengeData.challengeId}\n\n`;

                // Step 2: Validate (minimal test data)
                output += '2. Submitting validation...\n';
                const validateRes = await fetch(`${API_URL}/api/validate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        challengeId: challengeData.challengeId,
                        requestData: {
                            userAgent: navigator.userAgent,
                            vendor: navigator.vendor,
                            platform: navigator.platform,
                            language: navigator.language,
                            languages: Array.from(navigator.languages),
                            cookieEnabled: navigator.cookieEnabled,
                            webdriver: navigator.webdriver,
                            window: {
                                onorientationchange: 'onorientationchange' in window,
                                hasOrientation: 'orientation' in window,
                                isSecureContext: window.isSecureContext,
                            }
                        },
                        interactionData: {
                            mouseMovements: [],
                            pointerEvents: [],
                            pointerClickDurations: [],
                            clicks: []
                        },
                        mode: { slider: false, invisible: true, click: false }
                    })
                });
                const validateData = await validateRes.json();
                output += `   ${validateData.success ? '✓' : '✗'} Validation: ${validateData.validationSuccess ? 'PASSED' : 'FAILED'}\n`;
                if (validateData.token) {
                    output += `   Token: ${validateData.token.substring(0, 30)}...\n`;
                }
                if (validateData.reason) {
                    output += `   Reason: ${validateData.reason}\n`;
                }

                result.innerHTML = `
                    <p class="success">✓ Test Complete!</p>
                    <pre>${output}</pre>
                `;
            } catch (error) {
                result.innerHTML = `
                    <p class="error">✗ Failed!</p>
                    <pre>${output}\nError: ${error.message}</pre>
                `;
            }
        }
    </script>
</body>
</html>
